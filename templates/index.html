{% extends "base.html" %}

{% block content %}
<section class="hero">
    <h1>📈 股票 K 線分析</h1>
    <p>查看過去一年的開高低收數據與移動平均線，輕鬆掌握股價趨勢</p>
</section>

<section class="stock-section">
    <div class="search-box">
        <div class="input-group">
            <input 
                type="text" 
                id="stockSymbol" 
                class="stock-input" 
                placeholder="輸入股票代號（例如：2330.TW、AAPL）"
                autocomplete="off"
            >
            <button id="searchBtn" class="btn btn-search">查詢</button>
        </div>
        <p class="help-text">💡 提示：台股代號格式為「XXXX.TW」（如 2330.TW），美股直接輸入代號（如 AAPL）</p>
    </div>

    <div id="loadingSpinner" class="loading hidden">
        <div class="spinner"></div>
        <p>正在加載數據...</p>
    </div>

    <div id="errorMessage" class="error-message hidden"></div>

    <!-- K 線圖區塊 -->
    <div id="chartContainer" class="chart-container hidden">
        <div class="chart-header">
            <h2 id="chartTitle"></h2>
            <p id="dataRange" class="chart-range"></p>
        </div>
        <div id="candleChart"></div>

        <!-- 基本面卡片 -->
        <div class="stock-cards-grid">
            <div class="info-card">
                <div class="card-icon">💰</div>
                <div class="card-content">
                    <span class="card-label">每股盈餘 (Trailing EPS)</span>
                    <span id="cardEPS" class="card-value">--</span>
                </div>
            </div>
            <div class="info-card">
                <div class="card-icon">🚀</div>
                <div class="card-content">
                    <span class="card-label">EPS 年增率 (YoY)</span>
                    <span id="cardEPSGrowth" class="card-value">--</span>
                </div>
            </div>
        </div>

        <!-- 圖例 -->
        <div class="chart-legend">
            <span class="legend-item">
                <span class="legend-color up"></span>
                <span class="legend-text">上漲（紅）</span>
            </span>
            <span class="legend-item">
                <span class="legend-color down"></span>
                <span class="legend-text">下跌（綠）</span>
            </span>
            <span class="legend-item">
                <span class="legend-line" style="border-top: 3px solid #1f77d2;"></span>
                <span class="legend-text">MA5（週線）</span>
            </span>
            <span class="legend-item">
                <span class="legend-line" style="border-top: 3px solid #ff7c0b;"></span>
                <span class="legend-text">MA20（月線）</span>
            </span>
            <span class="legend-item">
                <span class="legend-line" style="border-top: 3px solid #9c27b0;"></span>
                <span class="legend-text">MA60（季線）</span>
            </span>
        </div>
    </div>

    <!-- 籌碼面區塊 -->
    <div id="institutionalContainer" class="chart-container hidden" style="margin-top:2rem;">
        <div class="chart-header">
            <h2 style="color:#667eea;">📊 三大法人買賣超（近30交易日）</h2>
        </div>
        <div id="institutionalChart"></div>
        <div style="overflow-x:auto; margin-top:1.5rem;">
            <table style="width:100%; border-collapse:collapse; font-size:14px;">
                <thead>
                    <tr style="background:#f0f4ff;">
                        <th style="padding:10px; border:1px solid #ddd; text-align:center;">日期</th>
                        <th style="padding:10px; border:1px solid #ddd; text-align:center; color:#e74c3c;">外資（張）</th>
                        <th style="padding:10px; border:1px solid #ddd; text-align:center; color:#2980b9;">投信（張）</th>
                        <th style="padding:10px; border:1px solid #ddd; text-align:center; color:#8e44ad;">自營商（張）</th>
                    </tr>
                </thead>
                <tbody id="institutionalTableBody"></tbody>
            </table>
        </div>
    </div>

</section>

<!-- ApexCharts CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.52.0/apexcharts.min.js"></script>

<script>
let chart = null;

const stockInput = document.getElementById('stockSymbol');
const searchBtn  = document.getElementById('searchBtn');
const loadingSpinner  = document.getElementById('loadingSpinner');
const errorMessage    = document.getElementById('errorMessage');
const chartContainer  = document.getElementById('chartContainer');
const chartTitle      = document.getElementById('chartTitle');
const dataRange       = document.getElementById('dataRange');

stockInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchStock(); });
searchBtn.addEventListener('click', searchStock);

async function searchStock() {
    const symbol = stockInput.value.trim();
    if (!symbol) { showError('請輸入股票代號'); return; }

    showLoading(true);
    errorMessage.classList.add('hidden');
    chartContainer.classList.add('hidden');
    document.getElementById('institutionalContainer').classList.add('hidden');

    try {
        const response = await fetch(`/api/stock?symbol=${encodeURIComponent(symbol)}`);
        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error || '無法獲取股票數據');
        }
        const data = await response.json();
        displayCandleChart(data);
        showLoading(false);
    } catch (error) {
        showError(`❌ ${error.message}`);
        showLoading(false);
    }
}

function displayCandleChart(data) {
    chartTitle.textContent = `${data.symbol} - K 線圖與移動平均線`;

    // 基本面卡片
    const epsEl    = document.getElementById('cardEPS');
    const growthEl = document.getElementById('cardEPSGrowth');
    if (epsEl && growthEl) {
        epsEl.textContent = `$${data.eps.toFixed(2)}`;
        if (data.eps_growth > 0) {
            growthEl.textContent = `+${data.eps_growth.toFixed(2)}%`;
            growthEl.style.color = '#FF0000';
        } else if (data.eps_growth < 0) {
            growthEl.textContent = `${data.eps_growth.toFixed(2)}%`;
            growthEl.style.color = '#008000';
        } else {
            growthEl.textContent = '0.00%';
            growthEl.style.color = '#666';
        }
    }

    const firstCandle = data.candles[0];
    const lastCandle  = data.candles[data.candles.length - 1];
    dataRange.textContent = `📅 ${firstCandle.time} 至 ${lastCandle.time}`;

    const minDate = new Date(firstCandle.time).getTime();
    const maxDate = new Date(lastCandle.time).getTime();

    const candleSeriesData = data.candles.map(c => ({
        x: new Date(c.time),
        y: [parseFloat(c.open), parseFloat(c.high), parseFloat(c.low), parseFloat(c.close)]
    }));
    const ma5Data  = data.candles.filter(c => c.ma5  !== null).map(c => ({ x: new Date(c.time), y: c.ma5 }));
    const ma20Data = data.candles.filter(c => c.ma20 !== null).map(c => ({ x: new Date(c.time), y: c.ma20 }));
    const ma60Data = data.candles.filter(c => c.ma60 !== null).map(c => ({ x: new Date(c.time), y: c.ma60 }));

    const options = {
        series: [
            { name: '價格', type: 'candlestick', data: candleSeriesData },
            { name: 'MA5',  type: 'line', data: ma5Data,  color: '#1f77d2' },
            { name: 'MA20', type: 'line', data: ma20Data, color: '#ff7c0b' },
            { name: 'MA60', type: 'line', data: ma60Data, color: '#9c27b0' }
        ],
        chart: {
            type: 'candlestick',
            height: 500,
            // ... 其他設定
        },
        crosshairs: {
            show: true,
            position: 'back',
            stroke: { color: '#999', width: 1, dashArray: 3 }
        },
        plotOptions: { candlestick: { colors: { upward: '#FF0000', downward: '#008000' } } },
        xaxis: {
            type: 'datetime', min: minDate, max: maxDate,
            labels: { format: 'yyyy-MM-dd', style: { colors: '#666', fontSize: '12px' } }
        },
        yaxis: {
            title: { text: '價格', style: { color: '#333', fontSize: '14px', fontWeight: 600 } },
            labels: { formatter: v => v.toFixed(2), style: { colors: '#666', fontSize: '12px' } },
            tooltip: { enabled: true }
        },
        tooltip: {
            enabled: true,
            theme: 'dark',
            shared: true,
            intersect: false,
            x: { format: 'yyyy-MM-dd' },
            custom: function() { return ''; }
        },
        grid: { borderColor: '#e0e0e0', strokeDashArray: 3, xaxis: { lines: { show: false } } },
        stroke: { width: [1, 2, 2, 2], colors: ['#666', '#1f77d2', '#ff7c0b', '#9c27b0'] },
        legend: { position: 'top', horizontalAlign: 'left', labels: { useSeriesColors: true } }
    };

    if (chart) chart.destroy();
    chart = new ApexCharts(document.querySelector('#candleChart'), options);
    chart.render();



    const chartEl = document.querySelector('#candleChart');


    // 滾輪縮放
    chartEl.addEventListener('wheel', (e) => {
        if (e.target.closest('#candleChart')) {
            e.preventDefault(); e.stopPropagation();
            if (e.deltaY < 0) setTimeout(() => chart.zoomIn(), 50);
            else setTimeout(() => chart.zoomOut(), 50);
        }
    }, { passive: false, capture: true });
    document.addEventListener('wheel', (e) => {
        if (e.target.closest('#candleChart')) { e.preventDefault(); e.stopPropagation(); }
    }, { passive: false, capture: true });

    chartContainer.classList.remove('hidden');

    // 載入籌碼面
    fetchInstitutional(data.symbol);
}

// ── 籌碼面 ──────────────────────────────────

async function fetchInstitutional(symbol) {
    try {
        const res  = await fetch(`/api/institutional?symbol=${encodeURIComponent(symbol)}`);
        const json = await res.json();
        if (!res.ok || json.error) {
            document.getElementById('institutionalContainer').classList.add('hidden');
            return;
        }
        renderInstitutional(json.data);
    } catch (e) {
        document.getElementById('institutionalContainer').classList.add('hidden');
    }
}

function renderInstitutional(records) {
    document.getElementById('institutionalContainer').classList.remove('hidden');

    const dates   = records.map(r => r.date);
    const foreign = records.map(r => r.foreign);
    const trust   = records.map(r => r.trust);
    const dealer  = records.map(r => r.dealer);

    if (window.instChart) window.instChart.destroy();
    window.instChart = new ApexCharts(document.querySelector('#institutionalChart'), {
        series: [
            { name: '外資',  data: foreign },
            { name: '投信',  data: trust },
            { name: '自營商', data: dealer }
        ],
        chart: { type: 'bar', height: 350, toolbar: { show: false } },
        plotOptions: { bar: { columnWidth: '60%', grouped: true } },
        colors: ['#e74c3c', '#2980b9', '#8e44ad'],
        xaxis: { categories: dates, labels: { rotate: -45, style: { fontSize: '11px' } } },
        yaxis: { title: { text: '買賣超（張）' }, labels: { formatter: v => v.toLocaleString() } },
        tooltip: { y: { formatter: v => v.toLocaleString() + ' 張' } },
        legend: { position: 'top' }
    });
    window.instChart.render();

    // 填表格（最新在上）
    const tbody = document.getElementById('institutionalTableBody');
    tbody.innerHTML = '';
    [...records].reverse().forEach(r => {
        const fc = r.foreign >= 0 ? '#c0392b' : '#27ae60';
        const tc = r.trust   >= 0 ? '#c0392b' : '#27ae60';
        const dc = r.dealer  >= 0 ? '#c0392b' : '#27ae60';
        tbody.innerHTML += `
            <tr style="text-align:center;">
                <td style="padding:8px; border:1px solid #ddd;">${r.date}</td>
                <td style="padding:8px; border:1px solid #ddd; color:${fc}; font-weight:600;">${r.foreign.toLocaleString()}</td>
                <td style="padding:8px; border:1px solid #ddd; color:${tc}; font-weight:600;">${r.trust.toLocaleString()}</td>
                <td style="padding:8px; border:1px solid #ddd; color:${dc}; font-weight:600;">${r.dealer.toLocaleString()}</td>
            </tr>`;
    });
}

// ── 工具函數 ──────────────────────────────────

function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.remove('hidden');
}
function showLoading(show) {
    if (show) loadingSpinner.classList.remove('hidden');
    else loadingSpinner.classList.add('hidden');
}
</script>
{% endblock %}
