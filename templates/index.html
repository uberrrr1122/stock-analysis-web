{% extends "base.html" %}

{% block content %}
<section class="hero">
    <h1>📈 股票 K 線分析</h1>
    <p>查看最近一個月的開高低收數據，輕鬆掌握股價趨勢</p>
</section>

<section class="stock-section">
    <div class="search-box">
        <div class="input-group">
            <input 
                type="text" 
                id="stockSymbol" 
                class="stock-input" 
                placeholder="輸入股票代號（例如：2330.TW、AAPL）"
                autocomplete="off"
            >
            <button id="searchBtn" class="btn btn-search">查詢</button>
        </div>
        <p class="help-text">💡 提示：台股代號格式為「XXXX.TW」（如 2330.TW），美股直接輸入代號（如 AAPL）</p>
    </div>

    <div id="loadingSpinner" class="loading hidden">
        <div class="spinner"></div>
        <p>正在加載數據...</p>
    </div>

    <div id="errorMessage" class="error-message hidden"></div>

    <div id="chartContainer" class="chart-container hidden">
        <div class="chart-header">
            <h2 id="chartTitle"></h2>
            <p id="dataRange" class="chart-range"></p>
        </div>
        <div id="candleChart"></div>
        <div class="chart-legend">
            <span class="legend-item">
                <span class="legend-color up"></span>
                <span class="legend-text">上漲（紅）</span>
            </span>
            <span class="legend-item">
                <span class="legend-color down"></span>
                <span class="legend-text">下跌（綠）</span>
            </span>
        </div>
    </div>
</section>

<!-- ApexCharts CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.45.0/apexcharts.min.js"></script>

<script>
let chart = null;

const stockInput = document.getElementById('stockSymbol');
const searchBtn = document.getElementById('searchBtn');
const loadingSpinner = document.getElementById('loadingSpinner');
const errorMessage = document.getElementById('errorMessage');
const chartContainer = document.getElementById('chartContainer');
const chartTitle = document.getElementById('chartTitle');
const dataRange = document.getElementById('dataRange');

// 允許按 Enter 鍵搜尋
stockInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        searchStock();
    }
});

// 點擊搜尋按鈕
searchBtn.addEventListener('click', searchStock);

async function searchStock() {
    const symbol = stockInput.value.trim();
    
    if (!symbol) {
        showError('請輸入股票代號');
        return;
    }

    showLoading(true);
    errorMessage.classList.add('hidden');
    chartContainer.classList.add('hidden');

    try {
        const response = await fetch(`/api/stock?symbol=${encodeURIComponent(symbol)}`);
        
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || '無法獲取股票數據');
        }

        const data = await response.json();
        displayCandleChart(data);
        showLoading(false);

    } catch (error) {
        showError(`❌ ${error.message}`);
        showLoading(false);
    }
}

function displayCandleChart(data) {
    chartTitle.textContent = `${data.symbol} - K 線圖`;
    dataRange.textContent = `📅 ${data.date_range.start} 至 ${data.date_range.end}`;

    // 轉換數據格式供 ApexCharts 使用
    const seriesData = data.candles.map(candle => ({
        x: new Date(candle.time),
        y: [
            parseFloat(candle.open),
            parseFloat(candle.high),
            parseFloat(candle.low),
            parseFloat(candle.close)
        ]
    }));

    const options = {
        series: [{
            data: seriesData
        }],
        chart: {
            type: 'candlestick',
            height: 400,
            toolbar: {
                show: true,
                tools: {
                    download: true,
                    selection: true,
                    zoom: true,
                    zoomin: true,
                    zoomout: true,
                    pan: true,
                    reset: true
                }
            },
            fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
        },
        plotOptions: {
            candlestick: {
                colors: {
                    upward: '#FF0000',    // 台灣股市：上漲為紅色
                    downward: '#008000'   // 台灣股市：下跌為綠色
                }
            }
        },
        xaxis: {
            type: 'datetime',
            labels: {
                format: 'yyyy-MM-dd',
                style: {
                    colors: '#666',
                    fontSize: '12px'
                }
            }
        },
        yaxis: {
            title: {
                text: '價格',
                style: {
                    color: '#333',
                    fontSize: '14px',
                    fontWeight: 600
                }
            },
            labels: {
                formatter: function(value) {
                    return value.toFixed(2);
                },
                style: {
                    colors: '#666',
                    fontSize: '12px'
                }
            },
            tooltip: {
                enabled: true
            }
        },
        tooltip: {
            enabled: true,
            theme: 'dark',
            x: {
                format: 'yyyy-MM-dd'
            },
            y: {
                formatter: function(value) {
                    if (value) {
                        return value.toFixed(2);
                    }
                    return value;
                }
            },
            custom: function({ seriesIndex, dataPointIndex, w }) {
                const candle = data.candles[dataPointIndex];
                return `
                    <div style="padding: 10px; font-size: 13px;">
                        <p><strong>${candle.time}</strong></p>
                        <p>開：${candle.open}</p>
                        <p>高：${candle.high}</p>
                        <p>低：${candle.low}</p>
                        <p style="color: ${candle.close >= candle.open ? '#FF0000' : '#008000'}; font-weight: bold;">
                            收：${candle.close}
                        </p>
                    </div>
                `;
            }
        },
        grid: {
            borderColor: '#e0e0e0',
            strokeDashArray: 3,
            xaxis: {
                lines: {
                    show: false
                }
            }
        },
        stroke: {
            width: 1,
            colors: ['#666']
        }
    };

    // 銷毀舊圖表
    if (chart) {
        chart.destroy();
    }

    chart = new ApexCharts(
        document.querySelector('#candleChart'),
        options
    );
    
    chart.render();
    chartContainer.classList.remove('hidden');
}

function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.remove('hidden');
}

function showLoading(show) {
    if (show) {
        loadingSpinner.classList.remove('hidden');
    } else {
        loadingSpinner.classList.add('hidden');
    }
}
</script>
{% endblock %}
