{% extends "base.html" %}

{% block content %}
<section class="hero">
    <h1>📈 股票 K 線分析</h1>
    <p>查看過去一年的開高低收數據與移動平均線，輕鬆掌握股價趨勢</p>
</section>

<section class="stock-section">
    <div class="search-box">
        <div class="input-group">
            <input 
                type="text" 
                id="stockSymbol" 
                class="stock-input" 
                placeholder="輸入股票代號（例如：2330.TW、AAPL）"
                autocomplete="off"
            >
            <button id="searchBtn" class="btn btn-search">查詢</button>
        </div>
        <p class="help-text">💡 提示：台股代號格式為「XXXX.TW」（如 2330.TW），美股直接輸入代號（如 AAPL）</p>
    </div>

    <div id="loadingSpinner" class="loading hidden">
        <div class="spinner"></div>
        <p>正在加載數據...</p>
    </div>

    <div id="errorMessage" class="error-message hidden"></div>

    <div id="chartContainer" class="chart-container hidden">
        <div class="chart-header">
            <h2 id="chartTitle"></h2>
            <p id="dataRange" class="chart-range"></p>
        </div>
        <div id="candleChart"></div>
        <div class="chart-legend">
            <span class="legend-item">
                <span class="legend-color up"></span>
                <span class="legend-text">上漲（紅）</span>
            </span>
            <span class="legend-item">
                <span class="legend-color down"></span>
                <span class="legend-text">下跌（綠）</span>
            </span>
            <span class="legend-item">
                <span class="legend-line" style="border-top: 3px solid #1f77d2;"></span>
                <span class="legend-text">MA5（週線）</span>
            </span>
            <span class="legend-item">
                <span class="legend-line" style="border-top: 3px solid #ff7c0b;"></span>
                <span class="legend-text">MA20（月線）</span>
            </span>
            <span class="legend-item">
                <span class="legend-line" style="border-top: 3px solid #9c27b0;"></span>
                <span class="legend-text">MA60（季線）</span>
            </span>
        </div>
    </div>
</section>

<!-- ApexCharts CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.52.0/apexcharts.min.js"></script>

<script>
let chart = null;

const stockInput = document.getElementById('stockSymbol');
const searchBtn = document.getElementById('searchBtn');
const loadingSpinner = document.getElementById('loadingSpinner');
const errorMessage = document.getElementById('errorMessage');
const chartContainer = document.getElementById('chartContainer');
const chartTitle = document.getElementById('chartTitle');
const dataRange = document.getElementById('dataRange');

stockInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchStock();
});

searchBtn.addEventListener('click', searchStock);

async function searchStock() {
    const symbol = stockInput.value.trim();

    if (!symbol) {
        showError('請輸入股票代號');
        return;
    }

    showLoading(true);
    errorMessage.classList.add('hidden');
    chartContainer.classList.add('hidden');

    try {
        const response = await fetch(`/api/stock?symbol=${encodeURIComponent(symbol)}`);

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || '無法獲取股票數據');
        }

        const data = await response.json();
        displayCandleChart(data);
        showLoading(false);

    } catch (error) {
        showError(`❌ ${error.message}`);
        showLoading(false);
    }
}

function displayCandleChart(data) {
    chartTitle.textContent = `${data.symbol} - K 線圖與移動平均線`;

    const firstCandle = data.candles[0];
    const lastCandle = data.candles[data.candles.length - 1];
    dataRange.textContent = `📅 ${firstCandle.time} 至 ${lastCandle.time}`;

    const minDate = new Date(firstCandle.time).getTime();
    const maxDate = new Date(lastCandle.time).getTime();

    const candleSeriesData = data.candles.map(candle => ({
        x: new Date(candle.time),
        y: [
            parseFloat(candle.open),
            parseFloat(candle.high),
            parseFloat(candle.low),
            parseFloat(candle.close)
        ]
    }));

    const ma5Data = data.candles
        .filter(candle => candle.ma5 !== null)
        .map(candle => ({ x: new Date(candle.time), y: candle.ma5 }));

    const ma20Data = data.candles
        .filter(candle => candle.ma20 !== null)
        .map(candle => ({ x: new Date(candle.time), y: candle.ma20 }));

    const ma60Data = data.candles
        .filter(candle => candle.ma60 !== null)
        .map(candle => ({ x: new Date(candle.time), y: candle.ma60 }));

    const options = {
        series: [
            { name: '價格', type: 'candlestick', data: candleSeriesData },
            { name: 'MA5',  type: 'line', data: ma5Data,  color: '#1f77d2' },
            { name: 'MA20', type: 'line', data: ma20Data, color: '#ff7c0b' },
            { name: 'MA60', type: 'line', data: ma60Data, color: '#9c27b0' }
        ],
        chart: {
            type: 'candlestick',
            height: 500,
            toolbar: {
                show: true,
                tools: {
                    download: true,
                    selection: true,
                    zoom: true,
                    zoomin: true,
                    zoomout: true,
                    pan: true,
                    reset: true
                }
            },
            fontFamily: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
        },
        plotOptions: {
            candlestick: {
                colors: {
                    upward: '#FF0000',
                    downward: '#008000'
                }
            }
        },
        xaxis: {
            type: 'datetime',
            min: minDate,
            max: maxDate,
            labels: {
                format: 'yyyy-MM-dd',
                style: { colors: '#666', fontSize: '12px' }
            }
        },
        yaxis: {
            title: {
                text: '價格',
                style: { color: '#333', fontSize: '14px', fontWeight: 600 }
            },
            labels: {
                formatter: function(value) { return value.toFixed(2); },
                style: { colors: '#666', fontSize: '12px' }
            },
            tooltip: { enabled: true }
        },
        tooltip: {
                    enabled: true,       // 保持開啟
                    theme: 'dark',
                    shared: false,      // ❌ 關閉複數共用（這就是錯位的元兇！）
                    intersect: true,    // 🎯 關鍵：滑鼠必須「精準碰到」K線，才會觸發（死角控制）
                    custom: function({ seriesIndex, dataPointIndex, w }) {
                        // ❌ 這裡面完全不回傳任何黑框網頁（客製化黑框徹底消失！）
                        return ''; 
                    },
                    x: {
                        show: true,     // 🗓️ 滑鼠移到哪，最下方就只顯示那一天的日期
                        format: 'yyyy-MM-dd'
                    },
                    y: {
                        title: {
                            formatter: () => '' // 價格軸旁邊不留廢話
                        }
                    }
                },
                // 👇 在 chart 設定裡確保十字準心是打開的，這樣滑鼠移到死角時，軸線上會有精準的對齊線
                crosshairs: {
                    show: true,
                    type: 'cross', // 十字準心模式
                    stroke: {
                        color: '#b6b6b6',
                        width: 1,
                        dashArray: 3
                    }
                },
        grid: {
            borderColor: '#e0e0e0',
            strokeDashArray: 3,
            xaxis: { lines: { show: false } }
        },
        stroke: {
            width: [1, 2, 2, 2],
            colors: ['#666', '#1f77d2', '#ff7c0b', '#9c27b0']
        },
        legend: {
            position: 'top',
            horizontalAlign: 'left',
            labels: { useSeriesColors: true }
        }
    };

    if (chart) {
        chart.destroy();
    }

    chart = new ApexCharts(document.querySelector('#candleChart'), options);
    chart.render();

    // 滾輪縮放
// 1. 滾輪縮放功能（保持本來完美能動的狀態）
    const chartElement = document.querySelector('#candleChart');
    chartElement.addEventListener('wheel', (e) => {
        if (e.target.closest('#candleChart')) {
            e.preventDefault();
            e.stopPropagation();
            if (e.deltaY < 0) {
                setTimeout(() => chart.zoomIn(), 50);
            } else {
                setTimeout(() => chart.zoomOut(), 50);
            }
        }
    }, { passive: false, capture: true });

    document.addEventListener('wheel', (e) => {
        if (e.target.closest('#candleChart')) {
            e.preventDefault();
            e.stopPropagation();
        }
    }, { passive: false, capture: true });

    // 2. 🔥 復活關鍵：把大容器顯示出來（就是這行，之前被我搞丟了！）
    chartContainer.classList.remove('hidden');

    // 3. 🧲 強力磁吸死角控制：滑鼠只要在圖表內，就自動強迫吸附到最近的 K 線
    chartElement.addEventListener('mousemove', (e) => {
        if (!chart || !chart.w || !chart.w.globals.seriesX[0]) return;

        const gridElement = document.querySelector('.apexcharts-grid');
        if (!gridElement) return;

        const gridRect = gridElement.getBoundingClientRect();
        const mouseX = e.clientX - gridRect.left;

        if (mouseX < 0 || mouseX > gridRect.width) return;

        const minX = chart.w.globals.minX;
        const maxX = chart.w.globals.maxX;
        const timePerPixel = (maxX - minX) / gridRect.width;
        const targetTime = minX + (mouseX * timePerPixel);

        const timestamps = chart.w.globals.seriesX[0];
        let closestIndex = 0;
        let minDiff = Infinity;

        for (let i = 0; i < timestamps.length; i++) {
            const diff = Math.abs(timestamps[i] - targetTime);
            if (diff < minDiff) {
                minDiff = diff;
                closestIndex = i;
            }
        }

        // 強制發動 ApexCharts 內建準心吸附
        if (chart.w.globals.customTooltip && typeof chart.w.globals.customTooltip.showTooltip === 'function') {
            chart.w.globals.customTooltip.showTooltip(closestIndex);
        }
    });

    // 當滑鼠離開時，準心收起來不留殘影
    chartElement.addEventListener('mouseleave', () => {
        if (chart && chart.w && chart.w.globals.customTooltip && typeof chart.w.globals.customTooltip.hideTooltip === 'function') {
            chart.w.globals.customTooltip.hideTooltip();
        }
    });
}
// 🧲 強力磁吸死角控制：滑鼠只要在圖表內，就自動吸附到最近的 K 線
    chartElement.addEventListener('mousemove', (e) => {
        if (!chart || !chart.w || !chart.w.globals.seriesX[0]) return;

        // 1. 取得圖表繪圖區的邊界與滑鼠的相對位置
        const gridRect = document.querySelector('.apexcharts-grid').getBoundingClientRect();
        const mouseX = e.clientX - gridRect.left;

        // 如果滑鼠滑出圖表繪圖區，就不處理
        if (mouseX < 0 || mouseX > gridRect.width) return;

        // 2. 將滑鼠的網頁像素位置，轉換成圖表真正的時間戳記（X軸數值）
        const minX = chart.w.globals.minX;
        const maxX = chart.w.globals.maxX;
        const timePerPixel = (maxX - minX) / gridRect.width;
        const targetTime = minX + (mouseX * timePerPixel);

        // 3. 從資料庫中找出「時間離滑鼠最近」的那一根 K 線
        const timestamps = chart.w.globals.seriesX[0];
        let closestIndex = 0;
        let minDiff = Infinity;

        for (let i = 0; i < timestamps.length; i++) {
            const diff = Math.abs(timestamps[i] - targetTime);
            if (diff < minDiff) {
                minDiff = diff;
                closestIndex = i;
            }
        }

        // 4. 🔥 磁力發動！強迫 ApexCharts 的十字準心直接移動到那一根 K 線的定點上
        chart.w.globals.customTooltip.showTooltip(closestIndex);
        
        // 同步更新底部的 X 軸十字線標籤
        const markers = chart.w.globals.markers;
        if (markers && markers.setX) {
            markers.setX(closestIndex);
        }
    });

    // 當滑鼠完全離開圖表範圍時，自動隱藏準心，不留殘影
    chartElement.addEventListener('mouseleave', () => {
        if (chart && chart.w && chart.w.globals.customTooltip) {
            chart.w.globals.customTooltip.hideTooltip();
        }
    });

function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.remove('hidden');
}

function showLoading(show) {
    if (show) {
        loadingSpinner.classList.remove('hidden');
    } else {
        loadingSpinner.classList.add('hidden');
    }
}
</script>
{% endblock %}
